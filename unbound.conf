server:
# 基础监听
	interface: 0.0.0.0
	interface: ::
	port: 5353
	do-ip4: yes
	do-ip6: no
	
	# 缓存
	msg-cache-size: 512m
	rrset-cache-size: 1536m
	key-cache-size: 256m
	neg-cache-size: 128m

	cache-max-ttl: 86400
	cache-min-ttl: 60

	prefetch: yes
	prefetch-key: yes

	serve-expired: yes
	serve-expired-ttl: 259200
	serve-expired-ttl-reset: yes
	serve-expired-reply-ttl: 15
	serve-expired-client-timeout: 0
	
	# 性能
	num-threads: 1
	outgoing-range: 8192
	num-queries-per-thread: 4096
	so-reuseport: yes
	edns-buffer-size: 1232
	max-udp-size: 1232

	# DNSSEC
	auto-trust-anchor-file: "/var/lib/unbound/root.key"

	# RFC 8806 Local Root Zone
	root-hints: "/var/lib/unbound/root.hints"


