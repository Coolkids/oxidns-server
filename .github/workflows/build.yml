name: Build Docker Image

on:
    workflow_dispatch:
    schedule:
        - cron: "0 */6 * * *"

permissions:
    contents: write

jobs:
    check:
        runs-on: ubuntu-latest
        outputs:
            changed: ${{ steps.check.outputs.changed }}
            version: ${{ steps.check.outputs.version }}

        steps:
            - uses: actions/checkout@v6
            - name: Get latest OxiDNS version
              id: latest
              run: |
                VERSION=$(curl -s https://api.github.com/repos/SvenShi/oxidns/releases/latest | jq -r .tag_name)
                echo "version=$VERSION" >> $GITHUB_OUTPUT

            - name: Compare version
              id: check
              run: |
                CURRENT=$(cat VERSION)

                if [ "$CURRENT" != "${{ steps.latest.outputs.version }}" ]; then
                    echo "changed=true" >> $GITHUB_OUTPUT
                    echo "version=${{ steps.latest.outputs.version }}" >> $GITHUB_OUTPUT
                else
                    echo "changed=false" >> $GITHUB_OUTPUT
                fi

            - name: Update VERSION file
              if: steps.check.outputs.changed == 'true'
              run: |
                echo "${{ steps.latest.outputs.version }}" > VERSION

            - name: Commit VERSION
              if: steps.check.outputs.changed == 'true'
              run: |
                git config user.name github-actions
                git config user.email github-actions@github.com

                git add VERSION
                git commit -m "Update OxiDNS version to ${{ steps.latest.outputs.version }}"
                git push

    build:
        needs: check
        if: needs.check.outputs.changed == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - name: Login DockerHub
              uses: docker/login-action@v4
              with:
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}

            - name: Set up Buildx
              uses: docker/setup-buildx-action@v4

            - name: Build and Push
              uses: docker/build-push-action@v7
              with:
                context: .
                push: true
                tags: |
                    ${{ secrets.DOCKER_USERNAME }}/oxidns-server:latest
                    ${{ secrets.DOCKER_USERNAME }}/oxidns-server:${{ needs.check.outputs.version }}
